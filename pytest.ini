[pytest]
# ── Discovery ─────────────────────────────────────────────────────────────────
# Tell pytest where to look for tests and which files to treat as test modules.
testpaths = tests

# ── Output ────────────────────────────────────────────────────────────────────
# -v  : verbose output — shows each test name and PASSED/FAILED individually
# -s  : do not suppress stdout (useful for debugging model loading messages)
addopts = -v -s

# ── Python path ───────────────────────────────────────────────────────────────
# Ensures the project root is on sys.path so that `from backend.app...` imports
# resolve correctly when pytest is invoked from the project root directory.
pythonpath = .
